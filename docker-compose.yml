version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: wdocar-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./wdocar.db:/app/wdocar.db
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./wdocar.db
      - SECRET_KEY=${SECRET_KEY:-wdocar-secret-key-change-in-production}
      - ALLOWED_ORIGINS=http://localhost:3000
      - VAPID_PRIVATE_KEY_FILE=/app/data/vapid_private.pem
      - VAPID_CLAIM_EMAIL=${VAPID_CLAIM_EMAIL:-mailto:admin@girocerto.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-GiroCerto <onboarding@resend.dev>}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wdocar-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: wdocar-network